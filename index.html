<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsychoDiary — Your Personal AI Psychologist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-base:       #0A0D14;
    --bg-surface:    rgba(25, 30, 42, 0.4);
    --bg-card:       linear-gradient(145deg, rgba(30, 38, 55, 0.5), rgba(15, 20, 30, 0.5));
    --border:        rgba(255, 255, 255, 0.06);
    --border-light:  rgba(255, 255, 255, 0.12);
    --accent:        #818cf8; 
    --accent-sec:    #c084fc; 
    --accent-glow:   rgba(129, 140, 248, 0.4);
    --text-main:     #f8fafc;
    --text-muted:    #94a3b8;
    --danger:        #fb7185; 
    --safe:          #34d399; 
    --radius-xl:     28px;
    --radius-lg:     20px;
    --radius-md:     14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: 
      radial-gradient(circle at 15% 30%, rgba(99, 102, 241, 0.08), transparent 40%),
      radial-gradient(circle at 85% 60%, rgba(192, 132, 252, 0.08), transparent 40%);
    pointer-events: none;
  }

  .layout {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 380px; 
    grid-template-rows: auto 1fr;
    gap: 0 48px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 48px;
  }

  header {
    grid-column: 1 / -1;
    padding: 32px 0;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Outfit', sans-serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--text-main);
    display: flex; align-items: center; gap: 10px;
  }
  .logo::before {
    content: '';
    display: block; width: 12px; height: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-sec));
    border-radius: 50%;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .header-status {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--text-muted);
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
  .dot.online { background: var(--safe); box-shadow: 0 0 10px rgba(52, 211, 153, 0.4); }

  main { display: flex; flex-direction: column; gap: 32px; padding-bottom: 48px; }

  .date-header { margin-bottom: -12px; }
  .date-header .date { font-family: 'Outfit', sans-serif; font-size: 44px; font-weight: 500; color: var(--text-main); }
  .date-header .weekday { font-size: 14px; color: var(--accent-sec); font-weight: 500; text-transform: uppercase; }

  .multi-day-container { display: flex; flex-direction: column; gap: 20px; }
  .day-wrapper {
    background: var(--bg-surface);
    backdrop-filter: blur(16px);
    border-radius: var(--radius-xl);
    padding: 24px 32px;
    border: 1px solid var(--border);
  }

  .day-label { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 500; color: var(--accent); margin-bottom: 12px; }
  .day-input { width: 100%; min-height: 80px; background: transparent; border: none; color: var(--text-main); font-family: inherit; font-size: 16px; outline: none; resize: vertical; }

  button.send {
    background: linear-gradient(135deg, var(--accent), var(--accent-sec));
    color: #fff; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500;
    padding: 16px 36px; cursor: pointer; border: none; border-radius: 30px;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); transition: 0.3s;
  }
  button.send:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
  button.send:disabled { background: #334155; cursor: not-allowed; }

  aside.dashboard { display: flex; flex-direction: column; gap: 20px; padding-bottom: 48px; }
  .widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .widget { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
  .widget.full { grid-column: 1 / -1; }
  .widget-header { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 20px; }

  .mood-chart { display: flex; align-items: flex-end; gap: 10px; height: 100px; padding-bottom: 5px; }
  .mood-bar { flex: 1; background: rgba(255,255,255,0.05); border-radius: 8px; position: relative; height: 100%; }
  .mood-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--accent-sec), var(--accent)); border-radius: 8px; transition: height 0.6s ease; }
  .mood-bar[data-score="low"] .mood-bar-fill { background: linear-gradient(to top, #be123c, var(--danger)); }
  .mood-bar[data-score="high"] .mood-bar-fill { background: linear-gradient(to top, #059669, var(--safe)); }

  .memory-stat .num { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 600; color: var(--accent); }
  .pattern-tag { display: flex; align-items: center; gap: 10px; font-size: 14px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; }

  .ai-response { display: none; background: rgba(30, 38, 50, 0.4); border-left: 4px solid var(--accent); border-radius: var(--radius-md); padding: 32px; margin-top: 20px; }
  .ai-response.visible { display: block; }
  .ai-text { font-size: 16px; line-height: 1.8; white-space: pre-line; }

  .history-item { display: grid; grid-template-columns: auto 1fr auto; gap: 20px; align-items: center; padding: 24px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; margin-top: 12px; transition: 0.3s; }
  .history-item:hover { background: rgba(40, 48, 65, 0.6); transform: translateX(5px); }
  .history-emoji { font-size: 28px; background: rgba(255,255,255,0.03); width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .history-text { font-size: 15px; color: var(--text-main); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>

<div class="layout">
  <header>
    <div class="logo">Psycho<span>Diary</span></div>
    <div class="header-status">
      <span id="statusText">Connecting...</span>
      <div class="dot" id="statusDot"></div>
    </div>
  </header>

  <main>
    <div class="date-header">
      <div class="date" id="currentDate"></div>
      <div class="weekday">Weekly Reflection</div>
    </div>
    <div id="multiDayContainer" class="multi-day-container"></div>
    <div class="submit-row">
      <button class="send" id="sendBtn">Analyze My Week ✧</button>
    </div>
    <div class="ai-response" id="aiResponse">
      <div class="ai-text" id="aiText"></div>
    </div>
    <div class="history-section">
      <h2 style="margin-top:40px; font-family:'Outfit'">Timeline</h2>
      <div id="historyList"></div>
    </div>
  </main>

  <aside class="dashboard">
    <div class="widget full">
      <div class="widget-header">Weekly Mood Trend</div>
      <div class="mood-chart" id="moodChart">
        <div class="mood-bar"><div class="mood-bar-fill" style="height:0%"></div></div>
        <div class="mood-bar"><div class="mood-bar-fill" style="height:0%"></div></div>
        <div class="mood-bar"><div class="mood-bar-fill" style="height:0%"></div></div>
        <div class="mood-bar"><div class="mood-bar-fill" style="height:0%"></div></div>
        <div class="mood-bar"><div class="mood-bar-fill" style="height:0%"></div></div>
        <div class="mood-bar"><div class="mood-bar-fill" style="height:0%"></div></div>
        <div class="mood-bar"><div class="mood-bar-fill" style="height:0%"></div></div>
      </div>
    </div>
    <div class="widget-grid">
      <div class="widget">
        <div class="widget-header">Memory Bank</div>
        <div class="memory-stat">
          <div class="num" id="memoryCount">0</div>
          <div style="font-size:12px; color:var(--text-muted)">entries saved</div>
        </div>
      </div>
      <div class="widget">
        <div class="widget-header">Patterns</div>
        <div id="patternList"></div>
      </div>
    </div>
    <div class="widget full">
      <div class="widget-header">AI Profile Analysis</div>
      <div class="profile-bio" id="profileBio">Awaiting more data to analyze your personality profile...</div>
    </div>
  </aside>
</div>

<script>
const API = ''; 
let history = [];

try {
  history = JSON.parse(localStorage.getItem('diary_history') || '[]');
} catch (e) {}

function escapeHtml(str) {
  return str ? str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
}

// Инициализация дней
(function init() {
  const now = new Date();
  const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  document.getElementById('currentDate').textContent = `${months[now.getMonth()]} ${now.getDate()}`;
  
  const container = document.getElementById('multiDayContainer');
  const jsDay = now.getDay();
  const adjustedDay = jsDay === 0 ? 6 : jsDay - 1;
  const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

  for(let i = 0; i <= adjustedDay; i++) {
    const div = document.createElement('div');
    div.className = 'day-wrapper';
    div.innerHTML = `
      <div class="day-label">${weekDays[i]} ${i===adjustedDay ? '<span style="opacity:0.4">(Today)</span>':''}</div>
      <textarea class="day-input" data-day="${weekDays[i]}" placeholder="What happened on ${weekDays[i]}?"></textarea>
    `;
    container.appendChild(div);
  }
  updateUI();
})();

async function submitEntry() {
  const inputs = document.querySelectorAll('.day-input');
  let text = '';
  inputs.forEach(i => { if(i.value.trim()) text += `--- ${i.dataset.day} ---\n${i.value}\n\n`; });
  if(!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Processing...';

  try {
    const r = await fetch(`${API}/api/entry`, {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text})
    });
    const data = await r.json();

    const entry = { text, response: data.response, mood: data.mood, timestamp: new Date().toISOString() };
    history.unshift(entry);
    localStorage.setItem('diary_history', JSON.stringify(history));

    document.getElementById('aiText').innerHTML = data.response.split('\n\n').map(p => `<p>${p}</p>`).join('');
    document.getElementById('aiResponse').classList.add('visible');
    
    inputs.forEach(i => i.value = '');
    updateUI();
  } catch(e) {
    alert("Connection error");
  } finally {
    btn.disabled = false; btn.textContent = 'Analyze My Week ✧';
  }
}

document.getElementById('sendBtn').onclick = submitEntry;

function updateUI() {
  renderHistory();
  updateMoodChart();
  updatePatterns();
  loadProfile();
}

function updateMoodChart() {
  const bars = document.querySelectorAll('.mood-bar-fill');
  bars.forEach(b => b.style.height = '0%');
  
  const last7 = [...history].slice(0, 7).reverse();
  const startAt = 7 - last7.length;

  last7.forEach((item, i) => {
    const score = item.mood?.score || 0;
    const bar = bars[startAt + i];
    if(bar) {
      bar.style.height = `${score * 10}%`;
      const parent = bar.parentElement;
      if(score <= 4) parent.dataset.score = 'low';
      else if(score >= 7) parent.dataset.score = 'high';
      else parent.removeAttribute('data-score');
    }
  });
}

function renderHistory() {
  const container = document.getElementById('historyList');
  document.getElementById('memoryCount').textContent = history.length;
  if(!history.length) return;

  container.innerHTML = history.map((item, i) => {
    const d = new Date(item.timestamp);
    const clean = item.text.replace(/---.*?---/g, '').replace(/\n/g, ' ').trim().slice(0, 60);
    return `
      <div class="history-item" onclick="window.expandHistory(${i})">
        <div class="history-emoji">${item.mood?.emoji || '📓'}</div>
        <div>
          <div class="history-text">${escapeHtml(clean)}...</div>
          <div class="history-meta">${d.toLocaleDateString()} · ${item.mood?.mood || 'Reflection'}</div>
        </div>
        <div style="font-weight:600; color:var(--accent)">${item.mood?.score || 0}/10</div>
      </div>
    `;
  }).join('');
}

window.expandHistory = (i) => {
  const item = history[i];
  document.getElementById('aiText').innerHTML = `<div style="margin-bottom:20px; color:var(--text-muted); font-style:italic">Your entry: ${escapeHtml(item.text.slice(0,200))}...</div>` + 
    item.response.split('\n\n').map(p => `<p>${p}</p>`).join('');
  document.getElementById('aiResponse').classList.add('visible');
  window.scrollTo({top: 0, behavior: 'smooth'});
};

function updatePatterns() {
  const list = document.getElementById('patternList');
  const allTags = history.flatMap(h => h.mood?.tags || []);
  const counts = {}; allTags.forEach(t => counts[t] = (counts[t] || 0) + 1);
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 2);
  
  list.innerHTML = top.length ? top.map(([tag]) => `<div class="pattern-tag"><span>💡</span> ${tag}</div>`).join('') : '<div style="font-size:12px; opacity:0.5">Need more entries...</div>';
}

async function loadProfile() {
  try {
    const r = await fetch(`${API}/api/profile`); const d = await r.json();
    if(d.bio) document.getElementById('profileBio').textContent = d.bio;
  } catch(e) {}
}

async function checkHealth() {
  try {
    const r = await fetch(`${API}/api/health`); const d = await r.json();
    if(d.status==='ok') { document.getElementById('statusDot').classList.add('online'); document.getElementById('statusText').textContent='Secure connection'; }
  } catch(e) {}
}
checkHealth();
</script>
</body>
</html>
