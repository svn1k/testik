<script>
const API = ''; 

// 1. БЕЗОПАСНОЕ чтение истории (не крашится, если расширения блокируют память)
let history = [];
try {
  history = JSON.parse(localStorage.getItem('diary_history') || '[]');
} catch (err) {
  console.warn('LocalStorage is blocked by browser/extension. History will not be saved locally.');
}

// 2. БЕЗОПАСНАЯ привязка кнопки (в обход блокировок SES/MetaMask)
document.getElementById('sendBtn').addEventListener('click', submitEntry);

// ── Date ──────────────────────────────────────────
(function setDate() {
  const now = new Date();
  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  document.getElementById('currentDate').textContent =
    `${months[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('currentWeekday').textContent = days[now.getDay()];
})();

// ── Char counter ─────────────────────────────────
document.getElementById('entryText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = `${this.value.length} / 3000`;
});

// ── Health check ─────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API}/api/health`);
    const d = await r.json();
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (d.status === 'ok') {
      dot.classList.add('online');
      text.textContent = d.llm ? 'AI connected' : 'No OG key';
    }
  } catch {
    document.getElementById('statusText').textContent = 'Server unreachable';
  }
}

// ── Submit entry ──────────────────────────────────
async function submitEntry() {
  const text = document.getElementById('entryText').value.trim();
  if (!text) return;

  document.getElementById('sendBtn').disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('hint').style.display = 'none';
  document.getElementById('aiResponse').classList.remove('visible');
  document.getElementById('moodBadge').classList.remove('visible');

  try {
    const resp = await fetch(`${API}/api/entry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    showMood(data.mood);
    showAIResponse(data.response, data.payment_hash);

    // Безопасное сохранение
    const entry = {
      text,
      response: data.response,
      mood: data.mood,
      timestamp: data.timestamp || new Date().toISOString()
    };
    history.unshift(entry);
    if (history.length > 30) history.pop();
    
    try {
      localStorage.setItem('diary_history', JSON.stringify(history));
    } catch (e) {} // Игнорируем ошибку сохранения

    renderHistory();
    updateMoodChart();

    document.getElementById('entryText').value = '';
    document.getElementById('charCount').textContent = '0 / 3000';

  } catch (err) {
    document.getElementById('aiText').textContent =
      '⚠️ Error connecting to backend. Make sure the server is running and configured.';
    document.getElementById('aiResponse').classList.add('visible');
    console.error(err);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('hint').style.display = '';
  }
}

function showMood(mood) {
  if (!mood) return;
  document.getElementById('moodEmoji').textContent  = mood.emoji  || '😐';
  document.getElementById('moodWord').textContent   = mood.mood   || '—';
  document.getElementById('moodScore').textContent  = `${mood.score || '—'}/10`;

  const tagsEl = document.getElementById('moodTags');
  tagsEl.innerHTML = '';
  (mood.tags || []).forEach(tag => {
    const span = document.createElement('span');
    span.className = 'mood-tag';
    span.textContent = tag;
    tagsEl.appendChild(span);
  });

  document.getElementById('moodBadge').classList.add('visible');
}

function showAIResponse(text, hash) {
  const el = document.getElementById('aiText');
  el.innerHTML = text.split('\n\n').filter(p => p.trim())
    .map(p => `<p>${p.trim()}</p>`).join('');

  if (hash) {
    document.getElementById('paymentHash').textContent = `tx: ${hash}`;
  }
  document.getElementById('aiResponse').classList.add('visible');
  document.getElementById('aiResponse').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:14px;font-style:italic;padding:20px 0">Your past entries will appear here...</div>';
    return;
  }
  list.innerHTML = history.map((item, i) => {
    const d = new Date(item.timestamp);
    const dateStr = `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const emoji = item.mood?.emoji || '📓';
    const score = item.mood?.score;
    return `
      <div class="history-item" onclick="expandHistory(${i})">
        <div class="history-emoji">${emoji}</div>
        <div class="history-content">
          <div class="history-text">${escapeHtml(item.text)}</div>
          <div class="history-meta">${dateStr} · ${item.mood?.mood || ''}</div>
        </div>
        ${score ? `<div class="history-score">${score}/10</div>` : ''}
      </div>
    `;
  }).join('');
}

window.expandHistory = function(i) { // Принудительно делаем доступной глобально
  const item = history[i];
  if (!item) return;
  document.getElementById('entryText').value = item.text;
  document.getElementById('charCount').textContent = `${item.text.length} / 3000`;
  showMood(item.mood);
  showAIResponse(item.response, '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateMoodChart() {
  const bars = document.querySelectorAll('#moodChart .mood-bar-fill');
  const last7 = history.slice(0, 7).reverse();
  bars.forEach((bar, i) => {
    const entry = last7[i];
    const score = entry?.mood?.score || 0;
    bar.style.height = `${(score / 10) * 100}%`;
    const parent = bar.parentElement;
    if (score <= 3)      parent.dataset.score = 'low';
    else if (score >= 7) parent.dataset.score = 'high';
    else                 delete parent.dataset.score;
  });
}

function updatePatterns() {
  const el = document.getElementById('patternList');
  if (history.length < 2) {
    el.innerHTML = '<div class="pattern-tag"><span class="icon">📝</span> Gathering data...</div>';
    return;
  }

  const scores = history.slice(0, 7).map(h => h.mood?.score || 5);
  const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
  const allMoods = history.flatMap(h => h.mood?.tags || []);
  const freq = {};
  allMoods.forEach(t => freq[t] = (freq[t] || 0) + 1);
  const top = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, 3);

  const patterns = [];
  if (avg < 4) patterns.push({ icon: '⚠️', text: 'Low mood this week', active: true });
  if (avg > 7) patterns.push({ icon: '✨', text: 'Good week', active: true });
  top.forEach(([tag]) => patterns.push({ icon: '🔖', text: tag, active: false }));
  if (!patterns.length) patterns.push({ icon: '🌿', text: 'Stable condition', active: false });

  el.innerHTML = patterns.map(p =>
    `<div class="pattern-tag ${p.active ? 'active' : ''}"><span class="icon">${p.icon}</span> ${p.text}</div>`
  ).join('');
}

async function loadProfile() {
  try {
    const r = await fetch(`${API}/api/profile`);
    const d = await r.json();
    const bio = d.user_bio || d.bio;
    if (bio) document.getElementById('profileBio').textContent = bio;
    const count = d.memories_count || d.total_memories;
    if (count) document.getElementById('memoryCount').textContent = count;
  } catch { /* offline */ }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('entryText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) submitEntry();
});

// ── Инициализация ────────────────────────────────
checkHealth();
renderHistory();
updateMoodChart();
updatePatterns();
loadProfile();
setInterval(checkHealth, 30000);
</script>
